pre-commit:
  commands:
    gitleaks:
      glob: "**/*"
      run: gitleaks git --pre-commit --staged
    oxfmt:
      run: bunx oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    oxlint:
      run: bunx oxlint --fix --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
